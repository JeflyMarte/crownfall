name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  GODOT_VERSION: "4.6.3"

jobs:
  test:
    name: Smoke + Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: ~/godot-bin
          key: godot-${{ env.GODOT_VERSION }}-linux-x86_64

      - name: Download Godot ${{ env.GODOT_VERSION }}
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/godot-bin
          curl -sSL -o /tmp/godot.zip \
            "https://github.com/godotengine/godot-builds/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /tmp/godot-extract
          mv "/tmp/godot-extract/Godot_v${GODOT_VERSION}-stable_linux.x86_64" ~/godot-bin/godot4
          chmod +x ~/godot-bin/godot4

      - name: Add Godot to PATH
        run: echo "$HOME/godot-bin" >> "$GITHUB_PATH"

      - name: Smoke test（既存受理ゲート）
        run: bash tools/smoke_test.sh

      - name: Unit tests（GUT）
        run: bash tools/run_tests.sh
